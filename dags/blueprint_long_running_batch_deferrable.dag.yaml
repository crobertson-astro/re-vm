dag_id: blueprint_long_running_batch_deferrable
schedule: "0 22 * * 5"
description: "Blueprint example for a long-running API-managed batch with deferrable polling."
tags: [legacy-migration, blueprint, long-running, deferrable, remote-execution]
owner: data-platform
retries: 2
retry_delay_minutes: 10
start_date: "2024-01-01"
catchup: false
max_active_runs: 1

steps:
  submit_and_wait:
    blueprint: http_async_job
    http_conn_id: batch_service_api
    submit_endpoint: /api/v1/batches/risk/runs
    status_endpoint_prefix: /api/v1/batches/risk/runs
    tracking_payload_field: client_run_id
    completion_key: state
    success_values: [COMPLETED]
    poke_interval_seconds: 300
    timeout_seconds: 36000
    payload:
      business_date: "{{ context.ds }}"
      requested_by: airflow
      batch_name: weekly-risk-batch

  publish_audit:
    blueprint: snowflake_sql
    depends_on: [submit_and_wait]
    sql: "CALL ANALYTICS.AUDIT.SP_LOG_BATCH_COMPLETION('{{ context.ds }}')"
    warehouse: TRANSFORMING
    database: ANALYTICS
    schema: AUDIT
