dag_id: blueprint_script_execution_guardrails
schedule: null
description: "Blueprint example for Windows versus Linux script execution guardrails."
tags: [legacy-migration, blueprint, powershell, shell, remote-execution]
owner: data-platform
retries: 2
retry_delay_minutes: 5
start_date: "2024-01-01"
catchup: false
max_active_runs: 10

steps:
  execute_script:
    blueprint: validated_script_execution
    target_os: linux
    script_kind: shell
    script_path: /opt/jobs/example.sh
    script_args: "--business-date {{ context.ds }}"
    linux_conn_id: linux_remote_executor
    windows_conn_id: windows_remote_executor
